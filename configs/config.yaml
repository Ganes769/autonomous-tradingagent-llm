# Trading Agent Configuration

# Data Sources
data:
  market_data_source: "yfinance"
  symbols: ["AAPL", "MSFT", "GOOGL", "AMZN", "NVDA", "META", "TSLA"]
  start_date: "2020-01-01"
  end_date: "2024-12-31"
  frequency: "daily"

# Event Extraction (Qwen LLM)
event_extraction:
  model_name: "Qwen/Qwen2.5-7B-Instruct"
  device: "cuda"           # cuda | cpu | mps
  max_tokens: 512
  temperature: 0.1
  batch_size: 8
  # extractor_type controls which extractor is used at runtime:
  #   "event"     — full LLM-based structured extraction (EventExtractor)
  #   "sentiment" — fast lexicon-based baseline (SentimentExtractor)
  #   "dummy"     — market data only, zero event features
  extractor_type: "event"

# Horizon Interpreter
horizon:
  short_half_life: 3.0     # trading days
  mid_half_life: 15.0
  long_half_life: 60.0
  blend_short: 0.50        # weight in composite signal
  blend_mid: 0.30
  blend_long: 0.20

# PPO Agent
ppo:
  learning_rate: 3e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5

# Trading Environment
trading:
  initial_cash: 100000.0
  transaction_cost: 0.001        # 0.1% per trade
  max_position_size: 0.25        # max 25% of portfolio per stock
  lookback_window: 60            # days of history in observation

# Reward Function
# All components are normalised by initial_cash before weighting.
reward:
  profit_weight: 1.0             # weight on daily P&L signal
  event_alignment_weight: 0.3    # bonus for aligning with event signals
  risk_penalty_weight: 0.1       # penalty for downside semi-deviation
  transaction_cost_penalty: 0.5  # extra penalty multiplier on turnover

# Training
training:
  total_timesteps: 30000   # number of env steps (dataset size for training)
  eval_frequency: 10000
  save_frequency: 50000
  log_dir: "./models/logs"
  checkpoint_dir: "./models/checkpoints"

# Evaluation
evaluation:
  metrics: ["sharpe", "sortino", "calmar", "max_drawdown", "total_return",
            "win_rate", "profit_factor"]
  risk_free_rate: 0.02           # 2% annual risk-free rate
  n_episodes: 10

# Comparison experiment
comparison:
  run_event_extractor: true      # evaluate with LLM event extraction
  run_sentiment_baseline: true   # evaluate with lexicon sentiment baseline
  # If event-based does not outperform sentiment on Sharpe+Sortino,
  # fall back to sentiment extractor automatically during inference.
  auto_fallback_to_sentiment: true
